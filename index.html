<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quote of the Day</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card">
      <p class="quote-text" id="quote-text">
        Click "New Quote" to get started!
      </p>
      <p class="quote-author" id="quote-author">— Author</p>
      <p class="counter" id="counter">Quote 0 of 10</p>
      <div class="btn-row">
        <button id="new-btn">New Quote</button>
        <button id="copy-btn">Copy</button>
        <span id="copied-msg" class="hidden">✓ Copied!</span>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
